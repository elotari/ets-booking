<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة تحكم مريم — إدارة الحجوزات</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── Live indicator ── */
    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(255,255,255,0.10);
      border: 1.5px solid rgba(255,255,255,0.22);
      border-radius: 20px;
      padding: 5px 13px;
      font-size: 0.75rem;
      font-weight: 700;
      color: rgba(255,255,255,0.9);
    }
    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ffa500;
      flex-shrink: 0;
      transition: background 0.4s;
    }
    .live-dot.connected   { background: #00e676; animation: livepulse 2s ease-in-out infinite; }
    .live-dot.error       { background: #ff5252; }
    @keyframes livepulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.55; transform: scale(0.85); }
    }

    .no-data {
      text-align: center;
      padding: 40px;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .loading-row td {
      text-align: center;
      color: var(--muted);
      padding: 24px;
      font-size: 0.88rem;
    }
    /* Override sec-cal-cell to be a block-level grid cell */
    .sec-cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
    }
    .sec-cal-cell {
      display: block;
      min-height: 90px;
      border-right: 1px solid var(--border-light);
      border-bottom: 1px solid var(--border-light);
      padding: 6px;
    }
    .sec-cal-cell:nth-child(7n+1) { border-right: 1px solid var(--border-light); }
    .sec-cal-cell:nth-child(7n)   { border-right: none; }
  </style>
</head>
<body>
<div class="page-wrapper">

  <!-- Header -->
  <div class="sec-header">
    <div>
      <h1>لوحة تحكم مريم — إدارة الحجوزات</h1>
      <p>عرض وإدارة جميع حجوزات قاعات الاجتماعات</p>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <div class="live-badge">
        <span class="live-dot" id="liveDot"></span>
        <span id="liveText">جارٍ الاتصال</span>
      </div>
      <a href="/" class="back-btn">← العودة للحجز</a>
    </div>
  </div>

  <!-- Stats Bar -->
  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-number" id="statToday">—</div>
      <div class="stat-label">حجوزات اليوم</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="statWeek">—</div>
      <div class="stat-label">حجوزات هذا الأسبوع</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="statTotal">—</div>
      <div class="stat-label">إجمالي الحجوزات</div>
    </div>
  </div>

  <!-- Calendar -->
  <div class="sec-calendar-wrap">
    <div class="sec-cal-header">
      <button class="cal-nav-btn" onclick="prevMonth()">&#8250;</button>
      <span class="month-label" id="calMonthLabel"></span>
      <button class="cal-nav-btn" onclick="nextMonth()">&#8249;</button>
    </div>
    <!-- Day headers -->
    <div class="sec-cal-grid" id="calDayHeaders"></div>
    <!-- Day cells -->
    <div class="sec-cal-grid" id="calGrid"></div>
  </div>

  <!-- Bookings Table -->
  <div class="bookings-table-wrap">
    <div class="table-header-bar">قائمة جميع الحجوزات</div>
    <div style="overflow-x:auto;">
      <table class="bookings-table" id="bookingsTable">
        <thead>
          <tr>
            <th>التاريخ</th>
            <th>الغرفة</th>
            <th>الوقت</th>
            <th>الاسم</th>
            <th>القسم</th>
            <th>الموضوع</th>
            <th>الخدمات</th>
            <th>REF</th>
            <th>الإجراءات</th>
          </tr>
        </thead>
        <tbody id="bookingsTbody">
          <tr class="loading-row"><td colspan="9">جارٍ تحميل البيانات...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<!-- Drawer Overlay -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>

<!-- Detail Drawer -->
<div class="drawer" id="drawer">
  <div class="drawer-head">
    <h3>تفاصيل الحجز</h3>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
  <div class="drawer-foot">
    <button class="btn-ghost btn-sm" onclick="closeDrawer()">إغلاق</button>
    <button class="btn-danger btn-sm" id="drawerDeleteBtn">حذف الحجز</button>
  </div>
</div>

<script>
/* ─── State ─── */
let allBookings = [];
let calYear  = new Date().getFullYear();
let calMonth = new Date().getMonth();
let currentDrawerBookingId = null;

/* ─── Arabic helpers ─── */
const AR_MONTHS = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
const AR_DAYS   = ['أحد','اثنين','ثلاثاء','أربعاء','خميس','جمعة','سبت'];

function toAr(n) {
  return String(n).replace(/\d/g, d => '٠١٢٣٤٥٦٧٨٩'[d]);
}
function pad(n) { return String(n).padStart(2,'0'); }

function formatDateAr(dateStr) {
  if (!dateStr) return '—';
  const [y,m,d] = dateStr.split('-');
  return `${toAr(parseInt(d))} ${AR_MONTHS[parseInt(m)-1]} ${toAr(y)}`;
}

function roomLabel(r) {
  return { a:'غرفة A', b:'غرفة B', c:'غرفة C' }[(r||'').toLowerCase()] || r;
}

function roomFloor(r) {
  return { a:'الطابق الأول', b:'الطابق الثاني', c:'الطابق الثالث' }[(r||'').toLowerCase()] || '';
}

function serviceLabel(s) {
  return { drinks:'مشروبات', catering:'كيترينج', projector:'جهاز عرض', video:'Video Conference' }[s] || s;
}

function parseServices(raw) {
  try { return JSON.parse(raw || '[]'); } catch { return []; }
}

function formatDuration(s, e) {
  const sm = timeToMin(s), em = timeToMin(e);
  const d = em - sm;
  if (d === 30)  return '٣٠ دقيقة';
  if (d === 60)  return 'ساعة واحدة';
  if (d === 90)  return 'ساعة ونصف';
  if (d === 120) return 'ساعتان';
  return `${toAr(d)} دقيقة`;
}

function timeToMin(t) {
  const [h,m] = (t||'0:0').split(':').map(Number);
  return h*60+m;
}

/* ─── Date helpers ─── */
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

function weekRange() {
  const now = new Date();
  const day = now.getDay();
  const diffToSun = -day;
  const diffToSat = 6 - day;
  const sun = new Date(now); sun.setDate(now.getDate() + diffToSun);
  const sat = new Date(now); sat.setDate(now.getDate() + diffToSat);
  const fmt = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  return [fmt(sun), fmt(sat)];
}

/* ─── Load Data ─── */
async function loadBookings() {
  try {
    const res = await fetch('/api/bookings/all');
    allBookings = await res.json();
    renderStats();
    renderCalendar();
    renderTable();
  } catch(e) {
    document.getElementById('bookingsTbody').innerHTML =
      '<tr class="loading-row"><td colspan="9">تعذّر تحميل البيانات</td></tr>';
  }
}

/* ─── Stats ─── */
function renderStats() {
  const today = todayStr();
  const [wStart, wEnd] = weekRange();

  const todayCount = allBookings.filter(b => b.date === today).length;
  const weekCount  = allBookings.filter(b => b.date >= wStart && b.date <= wEnd).length;

  document.getElementById('statToday').textContent  = toAr(todayCount);
  document.getElementById('statWeek').textContent   = toAr(weekCount);
  document.getElementById('statTotal').textContent  = toAr(allBookings.length);
}

/* ─── Calendar ─── */
function prevMonth() {
  calMonth--;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendar();
}

function nextMonth() {
  calMonth++;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendar();
}

function renderCalendar() {
  document.getElementById('calMonthLabel').textContent = AR_MONTHS[calMonth] + ' ' + toAr(calYear);

  // Day headers
  const headersEl = document.getElementById('calDayHeaders');
  headersEl.innerHTML = '';
  AR_DAYS.forEach(d => {
    const el = document.createElement('div');
    el.className = 'sec-cal-day-header';
    el.textContent = d;
    headersEl.appendChild(el);
  });

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  const today = todayStr();
  const firstDow = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();

  // Group bookings by date for this month
  const monthPrefix = `${calYear}-${pad(calMonth+1)}`;
  const byDate = {};
  allBookings.forEach(b => {
    if (b.date && b.date.startsWith(monthPrefix)) {
      if (!byDate[b.date]) byDate[b.date] = [];
      byDate[b.date].push(b);
    }
  });

  // Empty leading cells
  for (let i = 0; i < firstDow; i++) {
    const el = document.createElement('div');
    el.className = 'sec-cal-cell';
    grid.appendChild(el);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const date = new Date(calYear, calMonth, d);
    const dow  = date.getDay();
    const dateStr = `${calYear}-${pad(calMonth+1)}-${pad(d)}`;
    const isToday = dateStr === today;
    const isWeekend = dow === 5 || dow === 6;

    const cell = document.createElement('div');
    cell.className = 'sec-cal-cell' + (isWeekend ? ' disabled-day' : '') + (isToday ? ' today' : '');

    // Day number
    const numEl = document.createElement('div');
    numEl.className = 'sec-cal-num';
    numEl.textContent = toAr(d);
    cell.appendChild(numEl);

    // Booking chips
    const dayBookings = byDate[dateStr] || [];
    dayBookings.forEach(b => {
      const r = (b.room || '').toLowerCase();
      const chip = document.createElement('div');
      chip.className = `booking-chip chip-${r}`;
      chip.title = `${b.name} · ${b.start_time}–${b.end_time}`;
      chip.innerHTML = `<span class="chip-room">${(r||'?').toUpperCase()}</span>${b.name || ''} ${b.start_time}`;
      chip.addEventListener('click', () => openDrawer(b.id));
      cell.appendChild(chip);
    });

    grid.appendChild(cell);
  }
}

/* ─── Table ─── */
function renderTable() {
  const tbody = document.getElementById('bookingsTbody');

  if (allBookings.length === 0) {
    tbody.innerHTML = '<tr class="loading-row"><td colspan="9">لا توجد حجوزات حتى الآن</td></tr>';
    return;
  }

  tbody.innerHTML = allBookings.map(b => {
    const r = (b.room || '').toLowerCase();
    const svcs = parseServices(b.services);
    const svcHtml = svcs.length > 0
      ? svcs.map(s => `<span class="service-tag">${serviceLabel(s)}</span>`).join('')
      : '<span style="color:var(--muted);font-size:0.8rem;">—</span>';

    return `
      <tr>
        <td style="white-space:nowrap;">${formatDateAr(b.date)}</td>
        <td><span class="room-badge rm-${r}">${(r||'?').toUpperCase()}</span></td>
        <td style="direction:ltr;text-align:right;white-space:nowrap;">${b.start_time} – ${b.end_time}</td>
        <td>${escHtml(b.name || '')}</td>
        <td><strong>${escHtml(b.department || '')}</strong></td>
        <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${escHtml(b.subject||'')}">${escHtml(b.subject || '')}</td>
        <td>${svcHtml}</td>
        <td><span class="ref-code">${escHtml(b.ref || '')}</span></td>
        <td style="white-space:nowrap;">
          <button class="btn-ghost btn-sm" onclick="openDrawer(${b.id})" style="margin-left:6px;">تفاصيل</button>
          <button class="btn-danger btn-sm" onclick="confirmDelete(${b.id})">حذف</button>
        </td>
      </tr>
    `;
  }).join('');
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

/* ─── Drawer ─── */
function openDrawer(id) {
  const b = allBookings.find(x => x.id === id);
  if (!b) return;
  currentDrawerBookingId = id;

  const r = (b.room || '').toLowerCase();
  const svcs = parseServices(b.services);
  const svcText = svcs.length > 0 ? svcs.map(serviceLabel).join('، ') : 'لا يوجد';

  const rows = [
    ['رقم المرجع', `<span class="ref-code" style="font-size:1rem;">${escHtml(b.ref||'')}</span>`],
    ['القاعة',     `<span class="room-badge rm-${r}" style="display:inline-flex;align-items:center;justify-content:center;">${(r||'?').toUpperCase()}</span> ${roomLabel(r)} — ${roomFloor(r)}`],
    ['التاريخ',    formatDateAr(b.date)],
    ['الوقت',      `<span dir="ltr">${b.start_time} – ${b.end_time}</span>`],
    ['المدة',      formatDuration(b.start_time, b.end_time)],
    ['الاسم',      escHtml(b.name || '—')],
    ['القسم',      `<strong>${escHtml(b.department || '—')}</strong>`],
    ['الموضوع',    escHtml(b.subject || '—')],
    ['البريد',     b.email ? `<span dir="ltr">${escHtml(b.email)}</span>` : '—'],
    ['الهاتف',     b.phone ? `<span dir="ltr">${escHtml(b.phone)}</span>` : '—'],
    ['الخدمات',    svcText],
    ['ملاحظات',    b.notes ? escHtml(b.notes) : '—'],
    ['تاريخ الإنشاء', b.created_at ? new Date(b.created_at).toLocaleString('ar-SA') : '—'],
  ];

  document.getElementById('drawerBody').innerHTML = rows.map(([k,v]) =>
    `<div class="detail-row">
      <div class="detail-key">${k}</div>
      <div class="detail-val">${v}</div>
    </div>`
  ).join('');

  document.getElementById('drawerDeleteBtn').onclick = () => confirmDelete(id);

  document.getElementById('drawerOverlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
}

function closeDrawer() {
  document.getElementById('drawerOverlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
  currentDrawerBookingId = null;
}

/* ─── Delete ─── */
async function confirmDelete(id) {
  const b = allBookings.find(x => x.id === id);
  if (!b) return;
  const ok = confirm(`هل تريد حذف الحجز ${b.ref}؟\n${b.name} · ${b.date} · ${b.start_time}–${b.end_time}`);
  if (!ok) return;
  await deleteBooking(id);
}

async function deleteBooking(id) {
  try {
    const res = await fetch(`/api/bookings/${id}`, { method:'DELETE' });
    const data = await res.json();
    if (data.success) {
      closeDrawer();
      await loadBookings();
    } else {
      alert('فشل الحذف: ' + (data.error || 'خطأ غير معروف'));
    }
  } catch(e) {
    alert('تعذّر الاتصال بالخادم');
  }
}

/* ─── Init ─── */
loadBookings();

/* ─── SSE — real-time sync ─── */
(function initSSE() {
  const dot  = document.getElementById('liveDot');
  const text = document.getElementById('liveText');

  function setStatus(status) {
    dot.className = 'live-dot ' + status;
    text.textContent = { connected: 'متصل — مباشر', error: 'انقطع الاتصال', '': 'جارٍ الاتصال' }[status] || 'جارٍ الاتصال';
  }

  let es;
  let retryTimer;

  function connect() {
    if (es) { es.close(); }
    clearTimeout(retryTimer);

    es = new EventSource('/api/events');

    es.addEventListener('connected', () => setStatus('connected'));

    es.addEventListener('booking-changed', () => {
      loadBookings();
    });

    es.onerror = () => {
      setStatus('error');
      es.close();
      // Reconnect after 5 s
      retryTimer = setTimeout(connect, 5000);
    };
  }

  connect();
})();
</script>
</body>
</html>
