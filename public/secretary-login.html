<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>دخول السكرتيرة — ETS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Cairo', sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(160deg, #061826 0%, #0f2a4a 45%, #1a4f8a 100%);
    }
    .login-card {
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 8px 48px rgba(0,0,0,.3);
      width: 100%; max-width: 400px;
      overflow: hidden;
    }
    .login-head {
      background: #0f2a4a;
      padding: 36px 32px 28px;
      text-align: center;
    }
    .login-icon { font-size: 2.8rem; margin-bottom: 10px; }
    .login-head h1 { color: #fff; font-size: 1.3rem; font-weight: 700; margin-bottom: 4px; }
    .login-head p  { color: rgba(255,255,255,.55); font-size: 0.82rem; }

    .login-body { padding: 32px; }

    .form-label {
      display: block; font-size: 0.85rem; font-weight: 700;
      color: #0f2a4a; margin-bottom: 8px;
    }
    .form-input {
      width: 100%; border: 1.5px solid #d0dae6; border-radius: 10px;
      padding: 12px 16px; font-size: 1rem; font-family: 'Cairo', sans-serif;
      color: #0f2a4a; outline: none; transition: border-color .2s;
      direction: ltr; text-align: center; letter-spacing: 3px;
    }
    .form-input:focus { border-color: #1d5fa8; }

    .btn-login {
      width: 100%; margin-top: 20px;
      background: linear-gradient(135deg, #0f2a4a, #1d5fa8);
      color: #fff; border: none; border-radius: 12px;
      padding: 14px; font-size: 1rem; font-weight: 700;
      font-family: 'Cairo', sans-serif; cursor: pointer;
      transition: opacity .2s;
    }
    .btn-login:hover { opacity: .88; }
    .btn-login:disabled { opacity: .55; cursor: default; }

    .error-msg {
      margin-top: 14px; padding: 11px 14px;
      background: #fff3f3; border: 1.5px solid #fca5a5;
      border-radius: 10px; color: #b91c1c;
      font-size: 0.85rem; font-weight: 600; text-align: center;
      display: none;
    }
    .back-link {
      display: block; text-align: center; margin-top: 18px;
      font-size: 0.82rem; color: #7a8fa6; text-decoration: none;
    }
    .back-link:hover { color: #1d5fa8; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-head">
      <div class="login-icon">🔒</div>
      <h1>دخول السكرتيرة</h1>
      <p>لوحة تحكم إدارة الحجوزات — ETS</p>
    </div>
    <div class="login-body">
      <label class="form-label" for="passInput">كلمة المرور</label>
      <input class="form-input" type="password" id="passInput" placeholder="••••••••••"
             autocomplete="current-password" onkeydown="if(event.key==='Enter') doLogin()" />
      <div class="error-msg" id="errorMsg">كلمة المرور غير صحيحة</div>
      <button class="btn-login" id="loginBtn" onclick="doLogin()">دخول</button>
      <a class="back-link" href="/">← العودة للصفحة الرئيسية</a>
    </div>
  </div>

  <script>
    async function doLogin() {
      const btn = document.getElementById('loginBtn');
      const errEl = document.getElementById('errorMsg');
      const password = document.getElementById('passInput').value;
      if (!password) return;
      btn.disabled = true; btn.textContent = 'جارٍ التحقق...';
      errEl.style.display = 'none';
      try {
        const res = await fetch('/api/secretary/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
        });
        const data = await res.json();
        if (data.success) {
          window.location.href = '/secretary';
        } else {
          errEl.style.display = 'block';
          document.getElementById('passInput').value = '';
          document.getElementById('passInput').focus();
        }
      } catch {
        errEl.textContent = 'تعذّر الاتصال بالخادم';
        errEl.style.display = 'block';
      }
      btn.disabled = false; btn.textContent = 'دخول';
    }
  </script>
</body>
</html>
